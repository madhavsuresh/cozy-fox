name: CozyFox
options:
  bundleIdPrefix: net.thoughtbison.cozyfox
  deploymentTarget:
    iOS: "26.0"
  developmentLanguage: en
  groupSortPosition: top
  generateEmptyDirectories: true
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: complete
    GCC_NO_COMMON_BLOCKS: YES
    CLANG_ENABLE_MODULES: YES
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

packages:
  TransitCore:
    path: Packages/TransitCore

targets:
  CozyFox:
    type: application
    platform: iOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.thoughtbison.cozyfox
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
    sources:
      - path: CozyFox
      - path: Shared
    info:
      path: CozyFox/Info.plist
      properties:
        CFBundleDisplayName: Cozy Fox
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSLocationWhenInUseUsageDescription: "Cozy Fox uses your location to surface the closest e-bikes and to detect when you're leaving home or work, so transit info stays relevant. Location never leaves your phone."
        NSLocationAlwaysAndWhenInUseUsageDescription: "Cozy Fox watches for when you leave home or work to automatically surface your commute. It only uses region crossings, not continuous tracking."
        NSMotionUsageDescription: "Cozy Fox reads the iPhone motion coprocessor (always-on, near-zero battery) to tell whether you're walking, still, or in a vehicle. This sharpens auto-pin timing — for example, it won't surface your commute while you're still on the couch. Motion data never leaves your phone."
        NSSupportsLiveActivities: true
        NSSupportsLiveActivitiesFrequentUpdates: true
        BGTaskSchedulerPermittedIdentifiers:
          - net.thoughtbison.cozyfox.refresh
        NSAppTransportSecurity:
          NSExceptionDomains:
            lapi.transitchicago.com:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: true
        UIBackgroundModes:
          - location
          - fetch
          - processing
        CFBundleURLTypes:
          - CFBundleURLName: net.thoughtbison.cozyfox
            CFBundleURLSchemes:
              - cozyfox
    entitlements:
      path: CozyFox/CozyFox.entitlements
      properties:
        com.apple.security.application-groups:
          - group.net.thoughtbison.cozyfox
        keychain-access-groups:
          - $(AppIdentifierPrefix)net.thoughtbison.cozyfox
    dependencies:
      - package: TransitCore
        product: TransitModels
      - package: TransitCore
        product: TransitAPI
      - package: TransitCore
        product: TransitCache
      - package: TransitCore
        product: TransitLocation
      - package: TransitCore
        product: TransitDomain
      - package: TransitCore
        product: ChicagoTheme
      - package: TransitCore
        product: TransitUI
      - target: CozyFoxWidget
      - target: CozyFoxLiveActivity

  CozyFoxWidget:
    type: app-extension
    platform: iOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.thoughtbison.cozyfox.Widget
        TARGETED_DEVICE_FAMILY: "1"
        SKIP_INSTALL: YES
    sources:
      - path: CozyFoxWidget
    info:
      path: CozyFoxWidget/Info.plist
      properties:
        CFBundleDisplayName: Cozy Fox Widgets
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: CozyFoxWidget/CozyFoxWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.net.thoughtbison.cozyfox
        keychain-access-groups:
          - $(AppIdentifierPrefix)net.thoughtbison.cozyfox
    dependencies:
      - package: TransitCore
        product: TransitModels
      - package: TransitCore
        product: TransitCache
      - package: TransitCore
        product: TransitDomain
      - package: TransitCore
        product: ChicagoTheme
      - package: TransitCore
        product: TransitUI

  CozyFoxLiveActivity:
    type: app-extension
    platform: iOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.thoughtbison.cozyfox.LiveActivity
        TARGETED_DEVICE_FAMILY: "1"
        SKIP_INSTALL: YES
    sources:
      - path: CozyFoxLiveActivity
      - path: Shared
    info:
      path: CozyFoxLiveActivity/Info.plist
      properties:
        CFBundleDisplayName: Cozy Fox Commute
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: CozyFoxLiveActivity/CozyFoxLiveActivity.entitlements
      properties:
        com.apple.security.application-groups:
          - group.net.thoughtbison.cozyfox
    dependencies:
      - package: TransitCore
        product: TransitModels
      - package: TransitCore
        product: ChicagoTheme
      - package: TransitCore
        product: TransitUI

schemes:
  CozyFox:
    build:
      targets:
        CozyFox: all
        CozyFoxWidget: all
        CozyFoxLiveActivity: all
    run:
      config: Debug
    test:
      config: Debug
    archive:
      config: Release
